version: "3.9"

# Docker Compose para teste local dos MCP servers + Orchestrator
# Uso: cp .env.example .env && editar .env && docker compose up -d

services:

  # ============================================================
  # Grafana MCP Server
  # ============================================================
  grafana-mcp:
    build:
      context: .
      dockerfile: k8s/grafana-mcp/Dockerfile
    image: rlibralon/grafana-mcp-server:v1.0.0
    ports:
      - "8081:8080"
    environment:
      - GRAFANA_URL=${GRAFANA_URL:-http://host.docker.internal:3000}
      - GRAFANA_TOKEN=${GRAFANA_TOKEN}
      - GRAFANA_ORG_ID=${GRAFANA_ORG_ID:-1}
      - GRAFANA_TIMEOUT_S=15
      - GRAFANA_INSECURE_SKIP_VERIFY=false
      - MCP_SERVER_MODE=sse
      - MCP_LISTEN_PORT=8080
      - SERVICENOW_URL=${SERVICENOW_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

