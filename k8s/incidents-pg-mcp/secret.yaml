apiVersion: v1
kind: Secret
metadata:
  name: incidents-pg-mcp-secrets
  namespace: observability
  labels:
    app: incidents-pg-mcp-server
    component: mcp-server
type: Opaque
stringData:
  pg-user: "SUBSTITUA_COM_SEU_USER"
  pg-password: "SUBSTITUA_COM_SUA_SENHA"

