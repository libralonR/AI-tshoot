apiVersion: v1
kind: Secret
metadata:
  name: logs-mcp-secrets
  namespace: observability
  labels:
    app: logs-mcp-server
    component: mcp-server
type: Opaque
# Em produção, prefira IRSA (annotation no ServiceAccount).
# Estas chaves só devem ser preenchidas quando o cluster não tiver
# IRSA disponível e for necessário usar credenciais estáticas.
stringData:
  # Deixe vazio para usar IRSA / instance profile / credential chain.
  aws-access-key-id: ""
  aws-secret-access-key: ""

