apiVersion: v1
kind: ServiceAccount
metadata:
  name: logs-mcp-server
  namespace: observability
  labels:
    app: logs-mcp-server
    component: mcp-server
  # Annotation para IAM Roles for Service Accounts (IRSA).
  # Substitua pelo ARN do IAM Role que tem permissão para AssumeRole no
  # role configurado em LOGS_ROLE_ARN (ou para acessar S3 diretamente).
  #
  # Exemplo:
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/observability-logs-mcp
automountServiceAccountToken: true
