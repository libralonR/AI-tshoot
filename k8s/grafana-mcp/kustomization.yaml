apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
- serviceaccount.yaml
- configmap.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- networkpolicy.yaml
- hpa.yaml
- pdb.yaml

commonLabels:
  app.kubernetes.io/name: grafana-mcp-server
  app.kubernetes.io/component: mcp-server
  app.kubernetes.io/part-of: observability-copilot

images:
- name: your-registry/grafana-mcp-server
  newTag: latest

configMapGenerator:
- name: grafana-mcp-config
  behavior: merge
  literals:
  - grafana-url=http://grafana.observability.svc.cluster.local:3000
  - grafana-org-id=1
  - grafana-timeout=15
  - grafana-insecure-skip-verify=false
