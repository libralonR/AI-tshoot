apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp-server
  namespace: observability
  labels:
    app: grafana-mcp-server
    component: mcp-server
spec:
  type: ClusterIP
  selector:
    app: grafana-mcp-server
  ports:
  - name: stdio
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
