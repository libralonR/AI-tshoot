apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grafana-mcp-server
  namespace: observability
  labels:
    app: grafana-mcp-server
    component: mcp-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: grafana-mcp-server
  
  # Alternativa: usar maxUnavailable
  # maxUnavailable: 1
