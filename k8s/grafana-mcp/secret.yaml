apiVersion: v1
kind: Secret
metadata:
  name: grafana-mcp-secrets
  namespace: observability
  labels:
    app: grafana-mcp-server
    component: mcp-server
type: Opaque
stringData:
  # IMPORTANTE: Substitua com seu token real do Grafana
  # Para gerar um token:
  # 1. Acesse Grafana UI → Configuration → API Keys (ou Service Accounts)
  # 2. Crie um novo token com permissões de leitura (Viewer role)
  # 3. Copie o token e cole aqui
  grafana-token: "SUBSTITUA_COM_SEU_TOKEN_AQUI"

# ALTERNATIVA: Use External Secrets Operator ou Sealed Secrets
# Exemplo com External Secrets:
# ---
