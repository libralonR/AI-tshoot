apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-ui
  namespace: copilot
  labels:
    app: copilot-ui
    component: frontend
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: copilot-ui
  template:
    metadata:
      labels:
        app: copilot-ui
        component: frontend
        tier: frontend
    spec:
      serviceAccountName: copilot-ui
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: copilot-ui
        image: your-registry/copilot-ui:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8501
          protocol: TCP

        env:
        - name: ORCHESTRATOR_URL
          valueFrom:
            configMapKeyRef:
              name: copilot-ui-config
              key: orchestrator-url

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - copilot-ui
              topologyKey: kubernetes.io/hostname
