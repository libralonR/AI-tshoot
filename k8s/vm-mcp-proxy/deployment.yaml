apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-mcp-proxy
  namespace: observability
  labels:
    app: vm-mcp-proxy
    component: mcp-proxy
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vm-mcp-proxy
  template:
    metadata:
      labels:
        app: vm-mcp-proxy
        component: mcp-proxy
        tier: backend
    spec:
      serviceAccountName: vm-mcp-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: vm-mcp-proxy
        image: your-registry/vm-mcp-proxy:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8084
          protocol: TCP

        env:
        - name: VM_MCP_UPSTREAM
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-proxy-config
              key: vm-mcp-upstream

        - name: VM_MCP_MODE
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-proxy-config
              key: vm-mcp-mode

        - name: PROXY_LISTEN_PORT
          value: "8084"

        - name: PROXY_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-proxy-config
              key: proxy-timeout

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vm-mcp-proxy
              topologyKey: kubernetes.io/hostname

      tolerations:
      - key: "observability"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
