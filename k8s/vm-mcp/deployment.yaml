apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-mcp-server
  namespace: observability
  labels:
    app: vm-mcp-server
    component: mcp-server
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vm-mcp-server
  template:
    metadata:
      labels:
        app: vm-mcp-server
        component: mcp-server
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vm-mcp-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: vm-mcp
        image: your-registry/vm-mcp-server:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        - name: VM_INSTANCE_ENTRYPOINT
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-config
              key: vm-instance-entrypoint
        - name: VM_INSTANCE_TYPE
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-config
              key: vm-instance-type
        - name: VM_INSTANCE_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: vm-mcp-secrets
              key: vm-bearer-token
              optional: true
        - name: MCP_SERVER_MODE
          value: "http"
        - name: MCP_LISTEN_ADDR
          value: ":8080"
        - name: MCP_DISABLED_TOOLS
          valueFrom:
            configMapKeyRef:
              name: vm-mcp-config
              key: disabled-tools
              optional: true

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: tmp
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vm-mcp-server
              topologyKey: kubernetes.io/hostname

      tolerations:
      - key: "observability"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
