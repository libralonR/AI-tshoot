apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-mcp-config
  namespace: observability
  labels:
    app: vm-mcp-server
    component: mcp-server
data:
  # URL do VictoriaMetrics (vmsingle ou vmselect)
  vm-instance-entrypoint: "http://victoriametrics.observability.svc.cluster.local:8428"
  # single ou cluster
  vm-instance-type: "single"
  # Tools desabilitadas (export e write tools por segurança — read-only guardrail)
  disabled-tools: "export,flags,metric_relabel_debug,downsampling_filters_debug,retention_filters_debug,test_rules"
