apiVersion: v1
kind: Service
metadata:
  name: orchestrator-api
  namespace: copilot
  labels:
    app: orchestrator
    component: orchestrator
spec:
  type: ClusterIP
  selector:
    app: orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
