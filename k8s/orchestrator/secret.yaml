apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: copilot
  labels:
    app: orchestrator
    component: orchestrator
type: Opaque
stringData:
  # IMPORTANTE: Substitua com suas chaves reais
  # Estas são opcionais - apenas necessárias se usar LLM para raciocínio
  
  # OpenAI API Key (opcional)
  openai-api-key: "SUBSTITUA_COM_SUA_CHAVE_OPENAI"
  
  # Anthropic API Key (opcional)
  anthropic-api-key: "SUBSTITUA_COM_SUA_CHAVE_ANTHROPIC"

# ALTERNATIVA: Use External Secrets Operator ou Sealed Secrets
# Exemplo com External Secrets:
