apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: copilot
  labels:
    app: orchestrator
    component: orchestrator
type: Opaque
stringData:
  # OpenAI API Key
  openai-api-key: "SUBSTITUA_COM_SUA_CHAVE_OPENAI"
  
  # OpenAI Base URL (opcional — usar se estiver atrás de proxy corporativo)
  # Exemplo: https://seu-proxy.empresa.com/openai/v1
  openai-base-url: ""

