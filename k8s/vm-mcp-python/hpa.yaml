apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vm-mcp-python
  namespace: observability
  labels:
    app: vm-mcp-python
    component: mcp-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vm-mcp-python
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
